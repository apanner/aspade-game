[deploy]
startCommand = "npm start"
healthcheckPath = "/"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

[build]
builder = "DOCKERFILE"

[env]
NODE_ENV = "production"
NEXT_PUBLIC_API_URL = "https://backend-production-a719.up.railway.app"
NEXT_PUBLIC_BACKEND_URL = "https://backend-production-a719.up.railway.app"

